version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: mydeptos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=mydeptos_docker_secret_key
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/mydeptos
      - EMAIL_USER=test@gmail.com
      - EMAIL_PASSWORD=noconfigurado
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./static:/app/static

volumes:
  postgres_data: